<!DOCTYPE html>
<html>
  <head>
    <style>
    body {
      margin: 0;
      font-family: system-ui, Arial;
      background: #0f172a;
      color: #e2e8f0;
    }

    .card {
      padding: 16px;
      background: #1e293b;
      border-radius: 12px;
      width: 200px;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 16px;
      text-shadow: 0 0 6px rgba(56,189,248,0.6);
    }

    /* nicer checkbox row */
    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    /* modern checkbox color */
    input[type="checkbox"] {
      accent-color: #38bdf8;
    }

    /* hover effect */
    .toggle:hover {
      color: #38bdf8;
    }
    </style>
  </head>
  <body>
    <h3>better do :]</h3>

    <label>
      <input type="checkbox" id="toggle">
      Enable effect
    </label>

    <script src="popup.js"></script>
  </body>
</html>
